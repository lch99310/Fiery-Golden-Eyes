name: Update Property Data

on:
  # NOTE: the weekly cron schedule has been removed. The NSW VG site blocks
  # GitHub-hosted runners (all downloads return 403 Forbidden), so scheduled
  # runs can only fail. Weekly updates are done by uploading the VG weekly
  # ZIP to data-inbox/ — see process-uploaded-data.yml and the README.
  # This workflow is kept for manual retries in case the block is lifted.

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      mode:
        description: 'Fetch mode'
        required: true
        default: 'weekly'
        type: choice
        options:
          - weekly
          - full

permissions:
  contents: write
  actions: write

jobs:
  update-data:
    name: Fetch & Process NSW Property Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Determine fetch mode
        id: mode
        run: |
          # Use 'full' mode if properties.json doesn't exist or is sample data
          # Otherwise use 'weekly' for incremental updates
          MODE="${{ github.event.inputs.mode || 'auto' }}"
          if [ "$MODE" = "auto" ]; then
            if [ ! -f public/data/properties.json ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
              echo "No existing data — running full fetch"
            elif python3 -c "
          import json, sys
          try:
              d = json.load(open('public/data/properties.json'))
              if d.get('note', '').startswith('SAMPLE'):
                  sys.exit(1)
              if d.get('totalCount', 0) < 100:
                  sys.exit(1)
          except:
              sys.exit(1)
          " 2>/dev/null; then
              echo "mode=weekly" >> $GITHUB_OUTPUT
              echo "Existing real data found — running weekly update"
            else
              echo "mode=full" >> $GITHUB_OUTPUT
              echo "Sample/empty data — running full fetch"
            fi
          else
            echo "mode=$MODE" >> $GITHUB_OUTPUT
            echo "Manual mode: $MODE"
          fi

      - name: Fetch NSW Valuer General data
        run: |
          cd scripts
          if [ "${{ steps.mode.outputs.mode }}" = "weekly" ]; then
            echo "Running incremental weekly update..."
            python fetch_data.py --weekly --weeks 4 --no-sample-fallback
          else
            echo "Running full data fetch (yearly + weekly)..."
            python fetch_data.py --weeks 8 --no-sample-fallback
          fi
        env:
          PYTHONUNBUFFERED: "1"

      - name: Check output files
        run: |
          echo "=== Properties JSON ==="
          ls -lh public/data/properties.json || echo "MISSING"
          python3 -c "
          import json
          with open('public/data/properties.json') as f:
              d = json.load(f)
          print(f'Total: {d[\"totalCount\"]} properties')
          print(f'Updated: {d[\"lastUpdated\"]}')
          print(f'Source: {d.get(\"dataSource\", \"N/A\")}')
          if d.get('note'):
              print(f'Note: {d[\"note\"]}')
          " || true

          echo "=== Suburbs GeoJSON ==="
          ls -lh public/data/suburbs.geojson || echo "MISSING"

      - name: Commit and push updated data
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/data/properties.json
          # Only add suburbs.geojson if it changed (usually only first run)
          git add public/data/suburbs.geojson 2>/dev/null || true

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No data changes detected, skipping commit."
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update property data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      # GITHUB_TOKEN pushes do NOT trigger other workflows (GitHub design).
      # Explicitly trigger the deploy workflow so GitHub Pages gets updated.
      # Pass the exact SHA we just pushed: dispatching immediately after the
      # push can otherwise resolve `main` to the previous commit and deploy
      # stale data (this happened on 2026-06-30).
      - name: Trigger GitHub Pages deployment
        if: steps.commit.outputs.pushed == 'true'
        run: gh workflow run deploy.yml --ref main -f sha="$(git rev-parse HEAD)"
        env:
          GH_TOKEN: ${{ github.token }}
