# Process manually uploaded NSW VG PSI files
#
# The NSW Valuer General site blocks GitHub-hosted runners (every download
# returns 403 Forbidden), so property data cannot be fetched from CI.
# Instead, the repo owner downloads the weekly ZIP from the VG bulk PSI page
# (https://valuation.property.nsw.gov.au/embed/propertySalesInformation)
# on their own computer and uploads it to the data-inbox/ folder on main
# (GitHub web UI: Add file → Upload files).
#
# This workflow then parses the uploaded .zip/.dat files, merges the sales
# into public/data/properties.json, deletes the processed raw files, and
# deploys the site. Only real parsed VG data is ever published — if the
# uploaded files contain no valid Sydney sales, the run fails loudly and
# nothing is committed.

name: Process Uploaded PSI Data

on:
  push:
    branches:
      - main
    paths:
      - 'data-inbox/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: data-inbox
  cancel-in-progress: false

jobs:
  process:
    name: Parse & Publish Uploaded Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Always take the branch tip so multiple quick uploads are all
          # picked up by the last run to execute.
          ref: main

      - name: Check for uploaded files
        id: check
        run: |
          shopt -s nullglob nocaseglob
          files=(data-inbox/*.zip data-inbox/*.dat)
          if [ ${#files[@]} -eq 0 ]; then
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No .zip/.dat files in data-inbox/ — nothing to process."
          else
            echo "found=true" >> $GITHUB_OUTPUT
            printf 'Found: %s\n' "${files[@]}"
          fi

      - name: Set up Python
        if: steps.check.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        if: steps.check.outputs.found == 'true'
        run: pip install -r scripts/requirements.txt

      - name: Parse uploaded files
        if: steps.check.outputs.found == 'true'
        run: python scripts/fetch_data.py --local-dir data-inbox --no-sample-fallback
        env:
          PYTHONUNBUFFERED: "1"

      - name: Verify output is real data
        if: steps.check.outputs.found == 'true'
        run: |
          python3 -c "
          import json, sys
          d = json.load(open('public/data/properties.json'))
          note = str(d.get('note', ''))
          if note.startswith('SAMPLE'):
              sys.exit('Refusing to publish: output is marked SAMPLE data')
          if d.get('totalCount', 0) == 0:
              sys.exit('Refusing to publish: zero properties parsed')
          print(f'OK: {d[\"totalCount\"]} properties, updated {d[\"lastUpdated\"]}')
          "

      - name: Commit processed data and remove raw files
        if: steps.check.outputs.found == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/data/properties.json
          git add public/data/suburbs.geojson 2>/dev/null || true
          git rm -q --ignore-unmatch data-inbox/*.zip data-inbox/*.dat \
            data-inbox/*.ZIP data-inbox/*.DAT 2>/dev/null || true

          git commit -m "chore: publish property data from uploaded PSI files [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      # GITHUB_TOKEN pushes don't trigger other workflows, so dispatch the
      # deploy explicitly — with the exact SHA to avoid the stale-ref race.
      - name: Trigger GitHub Pages deployment
        if: steps.check.outputs.found == 'true'
        run: gh workflow run deploy.yml --ref main -f sha="$(git rev-parse HEAD)"
        env:
          GH_TOKEN: ${{ github.token }}
