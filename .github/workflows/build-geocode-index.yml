# Build the Sydney geocode index from G-NAF (open data, data.gov.au)
#
# Run this manually from the Actions tab (roughly quarterly — G-NAF updates
# every 3 months, and the index barely changes between releases). It:
#   1. downloads G-NAF Core (~1.5 GB) — data.gov.au allows cloud IPs,
#   2. builds data/sydney-address-index.json.gz,
#   3. re-geocodes every record in public/data/properties.json to its
#      exact address position,
#   4. commits both and redeploys the site.
#
# Weekly uploads afterwards geocode new records automatically because
# fetch_data.py uses the committed index when it exists.

name: Build Geocode Index (G-NAF)

on:
  workflow_dispatch:
    inputs:
      gnaf_url:
        description: 'Optional direct URL to a G-NAF Core ZIP (leave empty to auto-discover)'
        required: false
        type: string

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Download G-NAF & Rebuild Coordinates
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build index and re-geocode properties
        run: python scripts/build_geocode_index.py
        env:
          PYTHONUNBUFFERED: "1"
          GNAF_URL: ${{ inputs.gnaf_url }}

      - name: Commit index and re-geocoded data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sydney-address-index.json.gz public/data/properties.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: rebuild geocode index from G-NAF and re-geocode properties"
            git push
          fi

      - name: Trigger GitHub Pages deployment
        run: gh workflow run deploy.yml --ref main -f sha="$(git rev-parse HEAD)"
        env:
          GH_TOKEN: ${{ github.token }}
